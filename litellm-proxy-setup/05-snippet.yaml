model_list:
  - model_name: claude-sonnet
    litellm_params:
      model: os.environ/ANTHROPIC_MODEL_ID
      api_key: os.environ/ANTHROPIC_API_KEY
      # rpm/tpm: derive from your provider account, see below

  - model_name: claude-sonnet-fallback
    litellm_params:
      model: os.environ/OPENROUTER_MODEL_ID
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: gpt-4o
    litellm_params:
      model: os.environ/OPENAI_MODEL_ID
      api_key: os.environ/OPENAI_API_KEY

router_settings:
  routing_strategy: simple-shuffle
  num_retries: 2
  timeout: 30
  fallbacks:
    - claude-sonnet: ["claude-sonnet-fallback"]

litellm_settings:
  drop_params: false
  set_verbose: false
  json_logs: true
  disable_error_logs: false
  turn_off_message_logging: true

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: false
  ui_access_mode: admin_only
  database_connection_pool_limit: 20
